# fly.toml app configuration file generated for red-door on 2026-06-26T01:14:23Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'red-door'
primary_region = 'ord'

[env]
  THREADS_DATA_DIR = "/data"
  THREADS_POST_LIMIT = "5"
  THREADS_CACHE_TTL_MS = "300000"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
